<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Rastreabilidad</title>

<link rel="stylesheet" href="https://tablerospruebas-cell.github.io/PruebaRastreabilidad/styles.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</head>
<body>

<div class="container">

    <h1>📡 Rastreabilidad de Unidades</h1>

    <div class="cards">
        <div class="card total">
            <h2 id="total">0</h2>
            <p>Total</p>
        </div>

        <div class="card ok">
            <h2 id="reportando">0</h2>
            <p>Reportando</p>
        </div>

        <div class="card error">
            <h2 id="sinReportar">0</h2>
            <p>Sin Reportar</p>
        </div>

        <div class="card porcentaje">
            <h2 id="porcentaje">0%</h2>
            <p>Rastreabilidad</p>
        </div>
    </div>

    <canvas id="grafica"></canvas>

    <table>
        <thead>
            <tr>
                <th>Unidad</th>
                <th>Estado</th>
                <th>Último Registro</th>
                <th>Min sin reporte</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>

</div>

</body>
</html>
